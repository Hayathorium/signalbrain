<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" role="img" aria-label="Animated terminal: an agent's 0.92-confidence claim is re-executed after merge, the test fails, held: false is recorded forever, and the tooling class drops to GATE">
  <defs>
    <filter id="cshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="20" y="10" width="840" height="330" rx="14" fill="#12141a" stroke="#2a2f3a" filter="url(#cshadow)"/>

  <!-- title bar -->
  <circle cx="48" cy="36" r="6.5" fill="#ff5f57"/>
  <circle cx="70" cy="36" r="6.5" fill="#febc2e"/>
  <circle cx="92" cy="36" r="6.5" fill="#28c840"/>
  <text x="116" y="41" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#8a94a6">the catch — what happens to a confident claim after the merge</text>
  <line x1="20" y1="56" x2="860" y2="56" stroke="#2a2f3a" stroke-width="1"/>

  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14">
    <!-- beat 1: the claim -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;1;1;1;0" keyTimes="0;0.04;0.2;0.4;0.6;0.96;1" dur="14s" repeatCount="indefinite"/>
      <text x="46" y="92" fill="#8a94a6">$</text>
      <text x="64" y="92" fill="#eef2f7">sb score receipts/0042-tooling-cache-warmup.md</text>
      <text x="64" y="116" fill="#6e7681">agent's stated confidence:</text>
      <text x="292" y="116" fill="#2997ff">0.92</text>
      <text x="336" y="116" fill="#6e7681">— "done, tests pass"</text>
    </g>

    <!-- beat 2: re-execution -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;0" keyTimes="0;0.16;0.2;0.4;0.6;0.96;1" dur="14s" repeatCount="indefinite"/>
      <text x="64" y="152" fill="#6e7681">re-running the receipt's own measure command…</text>
      <text x="64" y="176" fill="#8a94a6">python3 -m pytest tests/test_cache.py -q</text>
      <text x="64" y="200" fill="#8a94a6">................</text>
      <text x="222" y="200" fill="#f87171">F</text>
      <text x="244" y="200" fill="#f87171">1 failed</text>
    </g>

    <!-- beat 3: the verdict -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1;1;0" keyTimes="0;0.3;0.36;0.4;0.6;0.96;1" dur="14s" repeatCount="indefinite"/>
      <text x="64" y="236" fill="#f87171" font-weight="bold">"held": false</text>
      <text x="196" y="236" fill="#6e7681">— recorded against the agent's calibration, forever</text>
    </g>

    <!-- beat 4: the consequence -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.5;0.56;0.6;0.64;0.96;1" dur="14s" repeatCount="indefinite"/>
      <text x="46" y="276" fill="#8a94a6">$</text>
      <text x="64" y="276" fill="#eef2f7">sb gate --by-class</text>
      <text x="64" y="300" fill="#8a94a6">"tooling":</text>
      <text x="160" y="300" fill="#febc2e">GATE</text>
      <text x="214" y="300" fill="#6e7681">— hit_rate 0.83 &lt; 0.95 · human review required until re-earned</text>
    </g>
  </g>
</svg>
