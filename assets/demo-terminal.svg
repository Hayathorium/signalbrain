  <circle cx="48" cy="36" r="6.5" fill="#ff5f57"/>
  <circle cx="70" cy="36" r="6.5" fill="#febc2e"/>
  <circle cx="92" cy="36" r="6.5" fill="#28c840"/>
  <text x="116" y="41" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#8a94a6">bash demo/demo.sh — real output, run it yourself</text>
  <line x1="20" y1="56" x2="860" y2="56" stroke="#2a2f3a" stroke-width="1"/>

  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14">
    <text x="46" y="94"  fill="#eef2f7">▶ An agent scores its own claim before anyone merged it</text>
