<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" role="img" aria-label="Terminal output of bash demo/demo.sh: self-score refused, pins earn zero trust, honest failure recorded, auto-merge eligibility earned at ten held claims">
